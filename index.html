<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My To-Do List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <main>
            <!-- Input Section -->
            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <!-- Stats -->
            <div class="stats">
                <span>Total: <strong id="totalCount">0</strong></span>
                <span>Completed: <strong id="completedCount">0</strong></span>
                <span>Remaining: <strong id="remainingCount">0</strong></span>
            </div>

            <!-- To-Do List -->
            <ul id="todoList" class="todo-list"></ul>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <p>No tasks yet. Add one to get started! 🚀</p>
            </div>

            <!-- Clear Completed Button -->
            <button id="clearBtn" class="clear-btn">Clear Completed Tasks</button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
